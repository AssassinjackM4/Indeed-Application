# MongoDB Atlas Connection
spring.data.mongodb.uri=${SPRING_DATA_MONGODB_URI}
spring.data.mongodb.database=${SPRING_DATA_MONGODB_DATABASE:Indeed-Application}
spring.data.mongodb.auto-index-creation=${SPRING_DATA_MONGODB_AUTO_INDEX_CREATION:true}

# Server Configuration
server.port=${PORT:10000}
server.servlet.context-path=/
server.error.whitelabel.enabled=false

# Logging
logging.level.root=INFO
logging.level.com.indeed.server=DEBUG

# Application Name
spring.application.name=indeed-server

